name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, and release macOS app
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          rm -f "$CERTIFICATE_PATH"

      - name: Run tests
        run: swift test

      - name: Store notary credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials until-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Build, sign, notarize
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CODESIGN_IDENTITY: "Developer ID Application: COMBINATRIX K.K. (3Y275A5TZ8)"
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          NOTARY_PROFILE: until-notary
        run: |
          : "${GOOGLE_OAUTH_CLIENT_ID:?Missing GOOGLE_OAUTH_CLIENT_ID secret}"
          : "${GOOGLE_OAUTH_CLIENT_SECRET:?Missing GOOGLE_OAUTH_CLIENT_SECRET secret}"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            export APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            export APP_VERSION="0.0.0"
          fi
          export BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          scripts/release.sh

      - name: Package artifacts
        run: |
          TAG="${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}"
          cp .build/release/Until.dmg "Until-${TAG}.dmg"
          # Sparkle updates from a .zip of the notarized + stapled .app (the .dmg
          # is only for first-time install). Stapled ticket rides inside the zip
          # so the update validates offline.
          ditto -c -k --keepParent .build/release/Until.app "Until-${TAG}.zip"

      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          : "${SPARKLE_ED_PRIVATE_KEY:?Missing SPARKLE_ED_PRIVATE_KEY secret}"
          TAG="$GITHUB_REF_NAME"
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_private_key"
          printf '%s\n' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          APP_DIR=.build/release/Until.app \
          ZIP_PATH="Until-${TAG}.zip" \
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Until-${TAG}.zip" \
          ED_KEY_FILE="$KEY_FILE" \
          OUT=appcast.xml \
          scripts/make-appcast.sh
          rm -f "$KEY_FILE"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # appcast.xml is served via the stable
          # releases/latest/download/appcast.xml URL that the app's SUFeedURL
          # points at; the .zip is the update payload, the .dmg the installer.
          gh release create "$GITHUB_REF_NAME" \
            Until-*.dmg Until-*.zip appcast.xml \
            --title "$GITHUB_REF_NAME" --generate-notes

      - name: Upload app artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Until-${{ github.ref_name }}
          path: Until-*.dmg
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
